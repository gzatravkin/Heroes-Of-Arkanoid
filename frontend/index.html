<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <script>
      /* localStorage bridge for .NET [JSImport] — must be defined before dotnet.js loads */
      window.arkStorage = {
        get:    function(k)    { return localStorage.getItem(k); },
        set:    function(k, v) { return localStorage.setItem(k, v); },
        remove: function(k)    { return localStorage.removeItem(k); }
      };
    </script>
    <meta name="theme-color" content="#0b0b12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Heroes of Arkanoid II" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Heroes of Arkanoid II</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* Fill the full viewport including notch area */
        width: 100%;
        height: 100%;
        /* Prevent overscroll bounce on iOS */
        overscroll-behavior: none;
        touch-action: none;
      }
      /* Gutter backdrop — visible only when the viewport is wider than the
         portrait design space (desktop). Warm ember glow over near-black. */
      body {
        display: flex;
        justify-content: center;
        background:
          radial-gradient(ellipse 70% 45% at 50% 12%, rgba(120, 64, 22, 0.30) 0%, transparent 65%),
          linear-gradient(180deg, #15100b 0%, #0a0709 55%, #040306 100%);
      }
      /* The game lives in a fixed portrait design space. On portrait phones
         (aspect ≲ 0.56) it fills the whole viewport; on anything wider it is
         letterboxed: full height, width clamped, centered, framed.
         100svh = small/stable viewport — excludes browser chrome (address bar)
         so the bottom of the game is never hidden behind it on iOS/Android. */
      #app {
        position: relative;
        width: 100%;
        height: calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
        height: calc(100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
        margin-top: env(safe-area-inset-top, 0px);
        max-width: calc((100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)) * 0.56);
        max-width: calc((100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)) * 0.56);
        /* The frame is the one scroll container for tall scenes. */
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
        background: #0b0b12;
        /* Scenes size themselves with cqw/cqh against this container, never
           the viewport, so the letterbox cannot be escaped. */
        container-type: size;
      }
      /* Ornamental frame around the game column once gutters appear. */
      @media (min-aspect-ratio: 4/7) {
        #app {
          border-left: 2px solid #7a5c28;
          border-right: 2px solid #7a5c28;
          box-shadow:
            0 0 0 1px #241a0d,
            -1px 0 0 1px rgba(255, 214, 130, 0.18),
            1px 0 0 1px rgba(255, 214, 130, 0.18),
            0 0 60px rgba(0, 0, 0, 0.9),
            0 0 140px rgba(255, 140, 40, 0.06);
        }
      }
      /* Pixi canvas fills the #app container */
      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
      // Enter fullscreen on first tap (hides browser chrome on Android Chrome).
      // iOS Safari ignores requestFullscreen in browser mode — it only goes fullscreen
      // via "Add to Home Screen" (manifest display:fullscreen handles that).
      (function () {
        function tryFullscreen() {
          var el = document.documentElement;
          try {
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
          } catch (_) {}
        }
        document.addEventListener("touchend", tryFullscreen, { once: true, passive: true });
      })();
    </script>
  </body>
</html>
