name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCXXamIUtTuGA1o8p5oLEL1CPQVnGOLGzc
          VITE_FIREBASE_AUTH_DOMAIN: heroesofarkanoid.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: heroesofarkanoid
          VITE_FIREBASE_STORAGE_BUCKET: heroesofarkanoid.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "744957111694"
          VITE_FIREBASE_APP_ID: 1:744957111694:web:23347f3ca18a9f370b88df
          VITE_FIREBASE_MEASUREMENT_ID: G-RK7PJWF406
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
